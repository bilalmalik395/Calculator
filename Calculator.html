<!DOCTYPE html>
<html>

<head>
  <title> Calculator</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #1e3c72, #2a5298, #000428, #004e92);
      background-size: 400% 400%;
      animation: bgAnimation 12s ease infinite;
      color: white;
    }

    @keyframes bgAnimation {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

   
    .calculator {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 0 35px rgba(0, 0, 0, 0.6);
      width: 380px;
      text-align: center;
    }


    .display {
      width: 100%;
      height: 60px;
      border-radius: 15px;
      border: none;
      margin-bottom: 20px;
      font-size: 26px;
      padding: 10px;
      text-align: right;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      outline: none;
    }

    
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      box-shadow: 0 4px rgba(0, 0, 0, 0.2);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px rgba(0, 0, 0, 0.4);
      background: #00c6ff;
      color: black;
    }

    .operator {
      background: rgba(0, 114, 255, 0.7);
    }

    .equal {
      background: #00ff99;
      color: black;
      grid-column: span 2;
    }

    .clear {
      background: #ff4d4d;
      color: white;
    }

    
    .history {
      margin-top: 25px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px;
      border-radius: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      color: white;
    }

    th,
    td {
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px;
      text-align: center;
    }

    th {
      background: rgba(255, 255, 255, 0.2);
    }

    .clearHistory {
      margin-top: 10px;
      width: 100%;
      background: #ff4d4d;
      color: white;
      padding: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

   
    .history::-webkit-scrollbar {
      width: 6px;
    }

    .history::-webkit-scrollbar-thumb {
      background: #00c6ff;
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <div class="calculator">
   
    <input type="text" id="display" class="display" placeholder="0">

   
    <div class="buttons">
      <button onclick="clearDisplay()" class="clear">C</button>
      <button onclick="append('%')" class="operator">%</button>
      <button onclick="append('/')" class="operator">÷</button>
      <button onclick="append('*')" class="operator">×</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('-')" class="operator">−</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('+')" class="operator">+</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="calculate()" class="equal">=</button>

      <button onclick="append('0')" style="grid-column: span 2;">0</button>
      <button onclick="append('.')">.</button>
    </div>


    <div class="history">
      <table>
        <thead>
          <tr>
            <th>Expression</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody id="historyTable">
        </tbody>
      </table>
      <button class="clearHistory" onclick="clearHistory()">Clear History</button>
    </div>
  </div>

  <script>
    let display = document.getElementById("display");
    let historyTable = document.getElementById("historyTable");

    
    function append(value) {
      display.value += value;
    }

    
    function clearDisplay() {
      display.value = "";
    }

  
    function calculate() {
      try {
        let expression = display.value.replace('×', '*').replace('÷', '/'); // handle symbols
        let result = eval(expression);

        
        let row = `<tr>
                   <td>${display.value}</td>
                   <td>${result}</td>
                 </tr>`;
        historyTable.innerHTML += row;

        display.value = result;
      } catch {
        alert("Invalid Expression!");
      }
    }

    
    function clearHistory() {
      historyTable.innerHTML = "";
    }

    
    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter") calculate();
      else if (e.key === "Backspace") display.value = display.value.slice(0, -1);
      else if (/[\d+\-*/%.]/.test(e.key)) display.value += e.key;
    });
  </script>

</body>

</html>
